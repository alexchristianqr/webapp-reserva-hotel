  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for the application service"
      GroupName: !Sub "${AWS::StackName}-sg"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-sg"

  # Permite que el ALB alcance el contenedor Tomcat en el ContainerPort.
  # El ALB y las tareas ECS comparten este Security Group, por eso es
  # una regla self-referenciada (mismo SG como origen).
  ContainerPortIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SecurityGroup
      IpProtocol: tcp
      FromPort: !Ref ContainerPort
      ToPort: !Ref ContainerPort
      SourceSecurityGroupId: !Ref SecurityGroup

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AWS::StackName}-tg"
      Port: !Ref ContainerPort
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckProtocol: HTTP
      HealthCheckPath: "/api/health"
      Matcher:
        HttpCode: 200
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${AWS::StackName}-alb"
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref SecurityGroup
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4

  LBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: !Ref ListenerPort
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

Outputs:
  ExportedTargetGroupArn:
    Value: !Ref TargetGroup
    Description: "ARN del Target Group para el LB"
  ExportedSecurityGroup:
    Value: !Ref SecurityGroup
    Description: "ID del Security Group creado para el LB"
  ExportedLoadBalancerArn:
    Value: !Ref LoadBalancer
    Description: "ARN del Load Balancer creado"
  ExportedLoadBalancerDnsName:
    Value: !GetAtt LoadBalancer.DNSName
    Description: "DNS del Load Balancer creado"
  ExportedLBListenerArn:
    Value: !Ref LBListener
    Description: "ARN del Listener del Load Balancer creado"
