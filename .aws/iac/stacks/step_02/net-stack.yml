AWSTemplateFormatVersion: '2010-09-09'
Description: "Networking resources stack"

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: "ID de la VPC donde se desplegarán los recursos. Debe ser una VPC existente. Ejemplo: vpc-12345678"
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: "Subredes publicas para el ALB. Deben ser subredes en la misma VPC que el LB. Ejemplo: subnet-12345678,subnet-87654321"
#  PrivateSubnetIds:
#    Type: List<AWS::EC2::Subnet::Id>
#    Description: "Subredes privadas para el servicio. Deben ser subredes en la misma VPC que el LB. Ejemplo: subnet-12345678,subnet-87654321"
  ListenerPort:
    Type: Number
    Default: 80
    Description: "Puerto publico del Listener del ALB (HTTP). Ejemplo: 80"
  ContainerPort:
    Type: Number
    Default: 8080
    Description: "Puerto del contenedor Tomcat al que enruta el Target Group. Ejemplo: 8080"

