AWSTemplateFormatVersion: "2010-09-09"
Description: "Database resources stack (RDS MySQL 8)"

Parameters:
  Env:
    Type: String
    AllowedValues: [ "dev", "qa", "prod" ]
    Default: "dev"
    Description: "Entorno de despliegue. Ejemplo: dev, qa, prod"
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: "ID de la VPC donde se desplegara la base de datos"
  DbSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: "Subredes (idealmente privadas) para el DB Subnet Group. Minimo 2 en AZs distintas. Ejemplo: subnet-aaa,subnet-bbb"
  AppSecurityGroupImported:
    Type: AWS::EC2::SecurityGroup::Id
    Description: "Security Group del servicio/ALB (exportado por el net-stack) al que se permitira conectar a MySQL (3306)"
  DBName:
    Type: String
    Default: "db_hotel"
    Description: "Nombre de la base de datos inicial"
  DBUsername:
    Type: String
    Default: "admin"
    Description: "Usuario maestro de la base de datos"
  DBInstanceClass:
    Type: String
    Default: "db.t3.micro"
    Description: "Clase de instancia RDS. Ejemplo: db.t3.micro"
  AllocatedStorage:
    Type: Number
    Default: 20
    Description: "Almacenamiento en GB"

Resources:

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "Subnet group for ${AWS::StackName}"
      SubnetIds: !Ref DbSubnetIds
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-subnet-group"

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Security group for the MySQL RDS instance"
      GroupName: !Sub "${AWS::StackName}-db-sg"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref AppSecurityGroupImported
          Description: "MySQL desde el servicio de aplicacion"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-db-sg"

  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${AWS::StackName}-mysql"
      DBName: !Ref DBName
      Engine: mysql
      EngineVersion: "8.0"
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref AllocatedStorage
      StorageType: gp3
      MasterUsername: !Ref DBUsername
      # RDS genera y administra la contrasena en AWS Secrets Manager (con rotacion).
      ManageMasterUserPassword: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 7
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-mysql"

Outputs:
  ExportedDbEndpoint:
    Value: !GetAtt DBInstance.Endpoint.Address
    Description: "Endpoint (host) de la instancia RDS MySQL"
  ExportedDbPort:
    Value: !GetAtt DBInstance.Endpoint.Port
    Description: "Puerto de la instancia RDS MySQL"
  ExportedDbName:
    Value: !Ref DBName
    Description: "Nombre de la base de datos"
  ExportedDbSecretArn:
    Value: !GetAtt DBInstance.MasterUserSecret.SecretArn
    Description: "ARN del secret en Secrets Manager con las credenciales (claves JSON: username, password)"
