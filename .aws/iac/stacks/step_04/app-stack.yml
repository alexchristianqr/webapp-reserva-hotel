AWSTemplateFormatVersion: "2010-09-09"
Description: "Java/Tomcat Application resources stack"

Parameters:
  Env:
    Type: String
    AllowedValues: [ "dev", "qa", "prod" ]
    Default: "dev"
    Description: "Entorno de despliegue"
  ECSClusterArn:
    Type: String
    Description: "ARN del clúster ECS"
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: "Subredes privadas"
  Cpu:
    Type: String
    AllowedValues: [ "256", "512", "1024", "2048", "4096" ]
    Default: "512"
  Memory:
    Type: String
    AllowedValues: [ "512", "1024", "2048", "3072", "4096", "8192", "16384", "30720" ]
    Default: "1024"
  RepoName:
    Type: String
    Description: "Nombre del repositorio ECR"
  ImageTag:
    Type: String
    Default: "latest"
  ContainerPort:
    Type: Number
    Default: 8080
    Description: "Puerto del contenedor Tomcat"
  DesiredCount:
    Type: Number
    Default: 1
    Description: "Numero de tareas ECS deseadas"
  SecurityGroupImported:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: "Security Group (exportado por el net-stack)"
  TargetGroupArnImported:
    Type: String
    Description: "ARN del Target Group (exportado por el net-stack)"
  DbEndpointImported:
    Type: String
    Description: "Endpoint (host) de RDS MySQL (exportado por el db-stack)"
  DbName:
    Type: String
    Default: "db_hotel"
    Description: "Nombre de la base de datos"
  DbSecretArnImported:
    Type: String
    Description: "ARN del secret en Secrets Manager con las credenciales de RDS (exportado por el db-stack)"

Resources:

  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${AWS::StackName}-ecs"
      Cluster: !Ref ECSClusterArn
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      NetworkConfiguration:
        AwsvpcConfiguration:
          # Las subredes enrutan a un Internet Gateway; con IP publica la tarea
          # obtiene salida hacia Secrets Manager / ECR / CloudWatch Logs.
          AssignPublicIp: ENABLED
          Subnets: !Ref PrivateSubnetIds
          SecurityGroups: !Ref SecurityGroupImported
      TaskDefinition: !Ref ECSTaskDefinition
      LoadBalancers:
        - TargetGroupArn: !Ref TargetGroupArnImported
          ContainerName: "webapp-reserva-hotel"
          ContainerPort: !Ref ContainerPort

  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-ecs-execution-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: !Sub "${AWS::StackName}-ecs-execution-policy"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref DbSecretArnImported

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-ecs-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${AWS::StackName}-ecs-task-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  ECSTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    DependsOn: LogGroup
    Properties:
      Family: !Sub "${AWS::StackName}-taskdef"
      RequiresCompatibilities: [ FARGATE ]
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      NetworkMode: awsvpc
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: "webapp-reserva-hotel"
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${RepoName}-${Env}:${ImageTag}"
          PortMappings:
            - ContainerPort: !Ref ContainerPort
          Environment:
            - Name: AWS_REGION
              Value: !Ref "AWS::Region"
            - Name: DB_HOST
              Value: !Ref DbEndpointImported
            - Name: DB_PORT
              Value: "3306"
            - Name: DB_NAME
              Value: !Ref DbName
          Secrets:
            # El secret de RDS es un JSON con claves "username" y "password".
            - Name: DB_USER
              ValueFrom: !Sub "${DbSecretArnImported}:username::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "${DbSecretArnImported}:password::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              # El log group lo administra CloudFormation (recurso LogGroup, con
              # retencion). El contenedor solo escribe; no lo auto-crea.
              awslogs-group: !Sub "/ecs/${AWS::StackName}-taskdef-webapp-reserva-hotel"
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: "tomcat"

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AWS::StackName}-taskdef-webapp-reserva-hotel"
      RetentionInDays: 7

Outputs:
  ExportedECSServiceName:
    Value: !Sub "${AWS::StackName}-ecs"
    Description: "Nombre del servicio ECS exportado para uso en otros stacks"
