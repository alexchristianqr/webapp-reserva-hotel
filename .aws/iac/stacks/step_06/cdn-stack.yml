AWSTemplateFormatVersion: '2010-09-09'
Description: "CDN stack: CloudFront delante del ALB para exponer la app por HTTPS valido (*.cloudfront.net) sin necesidad de un dominio propio. Pensado como capa TEMPORAL para demos: se crea con 'up cdn' y se elimina con 'down'/'cdn-down'."

Parameters:
  Env:
    Type: String
    Default: dev
    Description: "Entorno (dev, prod...). Solo para nombrado/etiquetas."
  AlbDomainName:
    Type: String
    Description: "DNS publico del ALB de origen. Ej: reserva-hotel-net-dev-alb-xxxx.us-east-1.elb.amazonaws.com"

Resources:

  # Distribucion CloudFront:
  #   * Viewer -> CloudFront: HTTPS (redirect-to-https) con el certificado por
  #     defecto de CloudFront, que cubre *.cloudfront.net (valido, sin warnings).
  #   * CloudFront -> Origen (ALB): HTTP en el puerto 80 (el ALB solo escucha 80).
  #   * Passthrough total (sin cache) para que funcionen el login por sesion
  #     (JSESSIONID), las cookies de sticky del ALB y los POST del formulario.
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "HTTPS temporal para ${AWS::StackName} (demo academica)"
        PriceClass: PriceClass_100
        HttpVersion: http2
        IPV6Enabled: true
        Origins:
          - Id: alb-origin
            DomainName: !Ref AlbDomainName
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
              HTTPPort: 80
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: alb-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachedMethods: [GET, HEAD]
          Compress: true
          # Managed-CachingDisabled: no cachea nada (app dinamica con sesion).
          CachePolicyId: "4135ea2d-6df8-44a3-9df3-4b5a84be39ad"
          # Managed-AllViewer: reenvia al origen todas las cookies, headers y
          # query strings del visitante (necesario para login/sesion).
          OriginRequestPolicyId: "216adef6-5c7f-47e4-b989-5492eafa07d3"
        ViewerCertificate:
          # Certificado por defecto de CloudFront (*.cloudfront.net). Valido en
          # cualquier navegador; no requiere dominio propio ni ACM.
          CloudFrontDefaultCertificate: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}"
        - Key: Env
          Value: !Ref Env

Outputs:
  ExportedCloudFrontDomainName:
    Value: !GetAtt Distribution.DomainName
    Description: "Dominio HTTPS de CloudFront (*.cloudfront.net)"
  ExportedCloudFrontUrl:
    Value: !Sub "https://${Distribution.DomainName}/login.jsp"
    Description: "URL HTTPS lista para compartir con el docente"
